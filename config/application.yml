telegram:
  token: "PLACEHOLDER"
  timeout-ms: 120000

llm:
  provider: openai       # openai | anthropic | ollama
  model: gpt-5-nano-2025-08-07
  api-key: "PLACEHOLDER"
  base-url: null

memory:
  db-path: ~/.assistant/memory.db
  window-size: 20
  search-limit: 5

# embedding:
#   provider: openai
#   model: text-embedding-3-small
#   api-key: "YOUR_KEY"
# Or ollama:
# embedding:
#   provider: ollama
#   model: nomic-embed-text
#   base-url: http://localhost:11434

tools:
  shell:
    timeout-seconds: 30
    max-output-chars: 10000
  web:
    max-content-chars: 8000
  filesystem:
    allowed-paths:
      - "~"
  email:
    enabled: false
    imap-host: imap.gmail.com
    imap-port: 993
    smtp-host: smtp.gmail.com
    smtp-port: 587
    username: ""
    password: ""
  github:
    enabled: false
    token: ""
  jira:
    enabled: false
    base-url: ""   # e.g. https://yourcompany.atlassian.net
    email: ""
    api-token: ""
  linear:
    enabled: false
    api-key: ""

voice:
  enabled: false
  api-key: ""   # leave blank to fall back to llm.api-key (works when provider=openai)

heartbeat:
  enabled: true
  cron: "0 8 * * 1-5"   # weekdays 8am Lisbon time
  prompt: "Good morning Tim. One sentence: what's the single most important thing to move forward today?"
