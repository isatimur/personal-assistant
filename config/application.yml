telegram:
  token: "PLACEHOLDER"
  timeout-ms: 120000

llm:
  provider: anthropic    # openai | anthropic | ollama
  model: claude-sonnet-4-6
  api-key: "PLACEHOLDER"  # overridden by secrets.yml
  fast-model: claude-haiku-4-5-20251001  # cheap model for tool-selection steps
  # to revert to OpenAI: set provider: openai, model: gpt-5-nano-2025-08-07

memory:
  db-path: ~/.assistant/memory.db
  window-size: 20
  search-limit: 5

# embedding:
#   provider: openai
#   model: text-embedding-3-small
#   api-key: "YOUR_KEY"
# Or ollama:
# embedding:
#   provider: ollama
#   model: nomic-embed-text
#   base-url: http://localhost:11434

tools:
  shell:
    timeout-seconds: 30
    max-output-chars: 10000
  web:
    max-content-chars: 8000
    search-provider: duckduckgo
    search-api-key: ""
  filesystem:
    allowed-paths:
      - "~"
  email:
    enabled: false
    imap-host: imap.gmail.com
    imap-port: 993
    smtp-host: smtp.gmail.com
    smtp-port: 587
    username: ""
    password: ""
  github:
    enabled: false
    token: ""
  jira:
    enabled: false
    base-url: ""   # e.g. https://yourcompany.atlassian.net
    email: ""
    api-token: ""
  linear:
    enabled: false
    api-key: ""
  http:
    enabled: true
  knowledge:
    enabled: true

voice:
  enabled: false  # set to true once you add an OpenAI api-key below (Whisper requires OpenAI, not Anthropic)
  api-key: ""     # set your OpenAI key here (in secrets.yml under voice.api-key)

discord:
  token: ""       # Bot token from https://discord.com/developers/applications
  enabled: false  # Set to true once token is configured

heartbeat:
  enabled: true
  cron: "0 8 * * 1-5"   # weekdays 8am Lisbon time
  prompt: "Good morning Tim. One sentence: what's the single most important thing to move forward today?"

reflection:
  enabled: true
  cron: "0 23 * * *"     # nightly at 11pm
  lookback-hours: 24
  update-soul: true
  update-skills: true
  update-user: true
  dry-run: false          # applies changes directly to workspace files

# Multi-agent routing: bind each channel to a named agent.
# Each agent gets its own workspace (under ~/.assistant/agents/<name>/) and memory DB.
# routing:
#   channels:
#     telegram: personal
#     discord:  work-agent
#   default: personal
